name: Build APKs

on:
  workflow_dispatch:
    inputs:
      build_universal:
        description: 'Also build Universal APK (all ABIs, ~120MB each)'
        type: boolean
        default: true

env:
  APP_BASE: GoRide_V5.6_Source_Code/Applications/GoRide-5.6
  FLUTTER_VERSION: 3.41.6

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [customer, driver]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$APP_BASE/${{ matrix.app }}/android/keystore.jks"

      - name: Write key.properties
        run: |
          cat > "$APP_BASE/${{ matrix.app }}/android/key.properties" <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Decode google-services.json
        run: |
          if [ "${{ matrix.app }}" = "customer" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_CUSTOMER_BASE64 }}" | base64 -d > "$APP_BASE/customer/android/app/google-services.json"
          else
            echo "${{ secrets.GOOGLE_SERVICES_DRIVER_BASE64 }}" | base64 -d > "$APP_BASE/driver/android/app/google-services.json"
          fi

      - name: Flutter pub get
        working-directory: ${{ env.APP_BASE }}/${{ matrix.app }}
        run: flutter pub get

      - name: Build split-per-abi APKs
        working-directory: ${{ env.APP_BASE }}/${{ matrix.app }}
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        if: ${{ inputs.build_universal }}
        working-directory: ${{ env.APP_BASE }}/${{ matrix.app }}
        run: flutter build apk --release

      - name: Rename APKs
        working-directory: ${{ env.APP_BASE }}/${{ matrix.app }}/build/app/outputs/flutter-apk
        run: |
          app="${{ matrix.app }}"
          cap="$(echo "$app" | sed 's/./\U&/')"
          [ -f app-arm64-v8a-release.apk ]    && mv app-arm64-v8a-release.apk    "9jaRidePro-${cap}.apk"
          [ -f app-armeabi-v7a-release.apk ]  && mv app-armeabi-v7a-release.apk  "9jaRidePro-${cap}-armv7.apk"
          [ -f app-x86_64-release.apk ]       && mv app-x86_64-release.apk       "9jaRidePro-${cap}-x86.apk"
          [ -f app-release.apk ]              && mv app-release.apk              "9jaRidePro-${cap}-Universal.apk"
          ls -lh

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: 9jaRidePro-${{ matrix.app }}-apks
          path: ${{ env.APP_BASE }}/${{ matrix.app }}/build/app/outputs/flutter-apk/9jaRidePro-*.apk
          if-no-files-found: error
          retention-days: 14
